<section class="catalog-container">
  <h1 class="gallery-title">Our Collection</h1>
  
  <div class="art-grid">
    @for (art of artList(); track art.id) {
      <div class="art-card">
        <div class="image-wrapper">
          <img [src]="art.imageUrl" [alt]="art.title">
          <span class="category-tag">{{ art.category }}</span>
        </div>
        <div class="art-info">
          <h3>{{ art.title }}</h3>
          <p class="artist-name">by {{ art.artist }}</p>
          <p class="price">{{ art.price | currency:'USD' }}</p>
          
          <div class="card-actions" style="display: flex; align-items: center; gap: 10px;">
            <a [routerLink]="['/catalog', art.id]" class="view-btn" style="text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; flex: 1;">
              View Details
            </a>
            
            <button class="edit-btn" 
                    (click)="onEditPrice(art.id, art.price)" 
                    title="Edit Price" 
                    style="background: #f0f0f0; border: none; border-radius: 4px; padding: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;">
              ✏️
            </button>

            <button class="delete-btn" (click)="onDelete(art.id)" title="Remove Artwork" style="display: flex; align-items: center; justify-content: center;">
              🗑️
            </button>
          </div>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <p>The gallery is currently empty. Be the first to list a masterpiece!</p>
      </div>
    }
  </div>
</section>
