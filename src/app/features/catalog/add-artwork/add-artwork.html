<div class="form-container">
  <div class="form-card">
    <h2>List New Artwork</h2>
    <p>Fill in the details to feature your work in the gallery.</p>

    <form [formGroup]="artForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Artwork Title</label>
        <input type="text" formControlName="title" placeholder="e.g. Midnight Dreams">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Artist Name</label>
          <input type="text" formControlName="artist" placeholder="Your Name">
        </div>
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" formControlName="price">
        </div>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select formControlName="category">
          <option value="Painting">Painting</option>
          <option value="Digital Art">Digital Art</option>
          <option value="Photography">Photography</option>
        </select>
      </div>

      <div class="form-group">
        <label>Image URL</label>
        <input type="text" formControlName="imageUrl" placeholder="Paste link here...">
      </div>

      <button type="submit" [disabled]="artForm.invalid" class="submit-btn">
        Post to Gallery
      </button>
    </form>
  </div>
</div>
