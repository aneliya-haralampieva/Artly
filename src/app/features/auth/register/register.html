<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Join Artly</h2>
    <p class="subtitle">Create an account to start your collection.</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="ArtLover123">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="artist@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="login-btn">
        Create Account
      </button>

      <p class="switch-auth">
        Already have an account? <a routerLink="/login">Sign In</a>
      </p>
    </form>
  </div>
</div>
